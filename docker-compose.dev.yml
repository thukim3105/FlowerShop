version: '3.8'

services:
  flowershop:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: flowershop-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

